<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua File Uploader</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .auth-section { margin: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .user-info { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Lua File Uploader</h1>
    <div class="auth-section">
        <button id="login-btn">Login with Discord</button>
        <button id="logout-btn" style="display:none;">Logout</button>
    </div>
    <div id="user-info" class="user-info"></div>

    <script>
        // Discord OAuth configuration
        const CLIENT_ID = 'YOUR_DISCORD_CLIENT_ID'; // Replace with your Discord app's client ID
        const REDIRECT_URI = encodeURIComponent('https://lua-file-uploader.netlify.app/.netlify/functions/auth-discord');
        const DISCORD_AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=identify%20email`;

        // Check if we have a user in localStorage (from previous login)
        let currentUser = JSON.parse(localStorage.getItem('discord_user'));

        // Update UI based on login state
        function updateUI() {
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userInfoDiv = document.getElementById('user-info');

            if (currentUser) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                userInfoDiv.innerHTML = `
                    <p>Logged in as: <strong>${currentUser.username}</strong>#${currentUser.discriminator}</p>
                    <p>Email: ${currentUser.email || 'Not provided'}</p>
                    <img src="https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png" width="100" />
                `;
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                userInfoDiv.innerHTML = '';
            }
        }

        // Handle login button click
        document.getElementById('login-btn').addEventListener('click', () => {
            window.location.href = DISCORD_AUTH_URL;
        });

        // Handle logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('discord_user');
            currentUser = null;
            updateUI();
        });

        // On page load, check for the OAuth code in URL (callback from Discord)
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                // We have a code, call our Netlify Function to exchange it
                try {
                    const response = await fetch(`/.netlify/functions/auth-discord?code=${code}`);
                    const data = await response.json();
                    if (data.user) {
                        localStorage.setItem('discord_user', JSON.stringify(data.user));
                        currentUser = data.user;
                        // Remove code from URL to avoid sharing
                        window.history.replaceState({}, document.title, '/');
                    } else {
                        alert('Login failed: ' + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Login error: ' + err.message);
                }
            }

            updateUI();
        })();
    </script>
</body>
</html>
